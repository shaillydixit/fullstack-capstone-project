name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - run: node app.js > /tmp/giftlink.log 2>&1 &
      - run: sleep 2
      - run: curl http://127.0.0.1:3000/api/gifts
